<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Elemental Quiz </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .btn-active { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
        .poke-card { transition: all 0.3s ease-in-out; cursor: pointer; }
        .poke-card:hover { transform: scale(1.05); border-color: #3b82f6; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); }
        .correct-card {
            border-color: #22c55e !important; background-color: #f0fdf4 !important;
            transform: scale(1.05); pointer-events: none; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }
        .wrong-card { border-color: #ef4444 !important; background-color: #fef2f2 !important; opacity: 0.5; pointer-events: none; }
        .clickable-audio:hover { filter: brightness(1.1); transform: scale(1.05); transition: all 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        .img-shrink { height: 6rem !important; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 新增：彈出浮動動畫 CSS */
        .floating-anim {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: floatUpFade 1s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        @keyframes floatUpFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            40% { transform: translate(-50%, -100%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen font-sans flex flex-col items-center py-6 md:py-8 overflow-x-hidden">

    <div class="w-[95%] max-w-none px-2 md:px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-blue-700 mb-2 md:mb-3"> Elemental Quiz!</h1>
        <p class="text-gray-600 mb-4 md:mb-6 text-sm md:text-xl">Listen to the question and choose the correct Pokémon.</p>
        
        <div class="flex justify-center gap-3 md:gap-6 mb-6 md:mb-8">
            <button id="btnSimple" onclick="setMode('simple')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 md:px-8 md:py-3 rounded-lg font-bold shadow transition btn-active text-sm md:text-xl">
                Simple (基礎)
            </button>
            <button id="btnAdvanced" onclick="setMode('advanced')" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 md:px-8 md:py-3 rounded-lg font-bold shadow transition text-sm md:text-xl">
                Advanced (進階)
            </button>
        </div>

        <div class="flex justify-between items-center max-w-5xl mx-auto mb-4 px-2 md:px-4">
            <div id="roundText" class="text-lg md:text-2xl font-bold text-gray-500">Round 1 / 5</div>
            <div id="message" class="text-xl md:text-3xl font-bold text-blue-500 h-8 md:h-10">Get Ready...</div>
            <div class="text-lg md:text-2xl font-bold text-green-600">Score: <span id="scoreText">0</span></div>
        </div>

        <div class="max-w-5xl mx-auto bg-white border-4 border-blue-200 rounded-2xl p-4 md:p-8 mb-6 md:mb-10 shadow-lg flex items-center justify-center gap-4 md:gap-6 min-h-[120px] md:min-h-[160px]">
            <div id="questionText" class="text-2xl md:text-4xl font-bold text-gray-800 leading-snug">
                Click a mode to start!
            </div>
            <button id="audioBtn" class="text-3xl md:text-5xl cursor-pointer clickable-audio bg-blue-100 p-3 md:p-4 rounded-full hidden" onclick="replayAudio()">
                🔊
            </button>
        </div>

        <div id="optionsContainer" class="flex justify-center gap-4 md:gap-8 flex-wrap max-w-6xl mx-auto"></div>
        
        <button id="nextBtn" onclick="nextRound()" class="mt-8 md:mt-10 bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-3 md:px-10 md:py-4 rounded-full font-bold shadow-lg transition text-lg md:text-2xl hidden mx-auto block">
            Next Question (下一題) ➡️
        </button>
    </div>

    <script>

            { i: 95, t: 'rock', e: 'Onix', z: '大岩蛇', eg: 'Rock Snake Pokémon', zg: '岩石蛇寶可夢', s: 1 },
            { i: 133, t: 'normal', e: 'Eevee', z: '伊布', eg: 'Evolution Pokémon', zg: '進化寶可夢', s: 1 },
            { i: 143, t: 'normal', e: 'Snorlax', z: '卡比獸', eg: 'Sleeping Pokémon', zg: '瞌睡寶可夢', s: 1 },

            { i: 5, t: 'fire', e: 'Charmeleon', z: '火恐龍', eg: 'Flame Pokémon', zg: '火焰寶可夢' },
            { i: 8, t: 'water', e: 'Wartortle', z: '卡咪龜', eg: 'Turtle Pokémon', zg: '龜寶可夢' },
            { i: 11, t: 'bug', e: 'Metapod', z: '鐵甲蛹', eg: 'Cocoon Pokémon', zg: '蛹寶可夢' },
            { i: 12, t: 'bug', e: 'Butterfree', z: '巴大蝶', eg: 'Butterfly Pokémon', zg: '蝴蝶寶可夢' },
            { i: 17, t: 'normal', e: 'Pidgeotto', z: '比比鳥', eg: 'Bird Pokémon', zg: '鳥寶可夢' },
            { i: 19, t: 'normal', e: 'Rattata', z: '小拉達', eg: 'Mouse Pokémon', zg: '鼠寶可夢' },
            { i: 23, t: 'poison', e: 'Ekans', z: '阿柏蛇', eg: 'Snake Pokémon', zg: '蛇寶可夢' },
            { i: 31, t: 'poison', e: 'Nidoqueen', z: '尼多后', eg: 'Drill Pokémon', zg: '鑽錐寶可夢' },
            { i: 45, t: 'grass', e: 'Vileplume', z: '霸王花', eg: 'Flower Pokémon', zg: '花寶可夢' },

            { i: 77, t: 'fire', e: 'Ponyta', z: '小火馬', eg: 'Fire Horse Pokémon', zg: '火馬寶可夢' },
            { i: 81, t: 'electric', e: 'Magnemite', z: '小磁怪', eg: 'Magnet Pokémon', zg: '磁鐵寶可夢' },
            { i: 82, t: 'electric', e: 'Magneton', z: '三合一磁怪', eg: 'Magnet Pokémon', zg: '磁鐵寶可夢' },
            { i: 86, t: 'water', e: 'Seel', z: '小海獅', eg: 'Sea Lion Pokémon', zg: '海獅寶可夢' },
            { i: 94, t: 'ghost', e: 'Gengar', z: '耿鬼', eg: 'Shadow Pokémon', zg: '影子寶可夢' },
            { i: 104, t: 'ground', e: 'Cubone', z: '卡拉卡拉', eg: 'Lonely Pokémon', zg: '孤獨寶可夢' },
            { i: 109, t: 'poison', e: 'Koffing', z: '瓦斯彈', eg: 'Poison Gas Pokémon', zg: '毒氣寶可夢' },
            { i: 110, t: 'poison', e: 'Weezing', z: '雙彈瓦斯', eg: 'Poison Gas Pokémon', zg: '毒氣寶可夢' },
            { i: 114, t: 'grass', e: 'Tangela', z: '蔓藤怪', eg: 'Vine Pokémon', zg: '藤蔓寶可夢' },
            { i: 116, t: 'water', e: 'Horsea', z: '墨海馬', eg: 'Dragon Pokémon', zg: '龍寶可夢' },
            { i: 118, t: 'water', e: 'Goldeen', z: '角金魚', eg: 'Goldfish Pokémon', zg: '金魚寶可夢' },
            { i: 120, t: 'water', e: 'Staryu', z: '海星星', eg: 'Star Shape Pokémon', zg: '星型寶可夢' },
            { i: 121, t: 'water', e: 'Starmie', z: '寶石海星', eg: 'Mysterious Pokémon', zg: '謎寶可夢' },
            { i: 123, t: 'bug', e: 'Scyther', z: '飛天螳螂', eg: 'Mantis Pokémon', zg: '螳螂寶可夢' },
            { i: 124, t: 'ice', e: 'Jynx', z: '迷唇姐', eg: 'Human Shape Pokémon', zg: '人形寶可夢' },
            { i: 125, t: 'electric', e: 'Electabuzz', z: '電擊獸', eg: 'Electric Pokémon', zg: '電擊寶可夢' },
            { i: 126, t: 'fire', e: 'Magmar', z: '鴨嘴火獸', eg: 'Spitfire Pokémon', zg: '吐火寶可夢' },
            { i: 129, t: 'water', e: 'Magikarp', z: '鯉魚王', eg: 'Fish Pokémon', zg: '魚寶可夢' },
            { i: 130, t: 'water', e: 'Gyarados', z: '暴鯉龍', eg: 'Atrocious Pokémon', zg: '凶惡寶可夢' },
            { i: 131, t: 'water', e: 'Lapras', z: '拉普拉斯', eg: 'Transport Pokémon', zg: '乘載寶可夢' },
            { i: 134, t: 'water', e: 'Vaporeon', z: '水伊布', eg: 'Bubble Jet Pokémon', zg: '吐泡寶可夢' },
            { i: 149, t: 'dragon', e: 'Dragonite', z: '快龍', eg: 'Dragon Pokémon', zg: '龍寶可夢' }
        ];

        const questionTemplates = {
            'grass': ["Which Pokémon is a Grass type?", "Who likes to hide in the forest?", "Find the Grass type Pokémon."],
            'fire': ["Which Pokémon is a Fire type?", "Who uses fire to attack?", "Find the Fire type Pokémon."],
            'water': ["Which Pokémon is a Water type?", "Who can shoot water?", "Who lives in the sea?"],
            'electric': ["Which Pokémon is an Electric type?", "Who uses electricity?", "Who has electric power?"],
            'bug': ["Which Pokémon is a Bug type?", "Who looks like an insect?", "Who lives in the trees?"],
            'normal': ["Which Pokémon is a Normal type?", "Find the Normal type Pokémon."],
            'rock': ["Which Pokémon is a Rock type?", "Who is made of rocks?", "Who lives in the mountain?"],
            'ground': ["Which Pokémon is a Ground type?", "Who likes to dig in the dirt?"],
            'ghost': ["Which Pokémon is a Ghost type?", "Who is a scary ghost?"],
            'poison': ["Which Pokémon is a Poison type?", "Who uses poison to attack?"],
            'fighting': ["Which Pokémon is a Fighting type?", "Who likes to punch and kick?"],
            'psychic': ["Which Pokémon is a Psychic type?", "Who has magic mind power?"],
            'dragon': ["Which Pokémon is a Dragon type?", "Who is a strong dragon?"],
            'ice': ["Which Pokémon is an Ice type?", "Who likes the cold snow?"],
            'fairy': ["Which Pokémon is a Fairy type?", "Who has fairy magic?"]
        };

        let currentMode = 'simple'; 
        let currentRound = 1;
        const totalRounds = 5; 
        let score = 0;
        let targetPokemon = null; 
        let currentQuestionText = "";
        let isProcessing = false; 

        function speakText(text, speechRate = 1) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = speechRate; 
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function replayAudio() {
            if(currentQuestionText) speakText(currentQuestionText, 0.75);
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnSimple').classList.remove('btn-active');
            document.getElementById('btnAdvanced').classList.remove('btn-active');
            
            if (mode === 'simple') document.getElementById('btnSimple').classList.add('btn-active');
            else document.getElementById('btnAdvanced').classList.add('btn-active');
            
            initGame();
        }

        function initGame() {
            currentRound = 1;
            score = 0;
            isProcessing = false; 
            
            document.getElementById('scoreText').innerText = score;
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('nextBtn').innerText = "Next Question (下一題) ➡️";
            document.getElementById('nextBtn').onclick = nextRound;
            startRound();
        }

        function startRound() {
            if (isProcessing) return; 
            
            document.getElementById('roundText').innerText = `Round ${currentRound} / ${totalRounds}`;
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('nextBtn').classList.add('hidden');

            const pool = currentMode === 'simple' ? pokeDB.filter(p => p.s) : pokeDB;
            const shuffledPool = [...pool].sort(() => Math.random() - 0.5);
            
            let selectedOptions = [];
            let usedTypes = [];
            
            for (let p of shuffledPool) {
                if (!usedTypes.includes(p.t)) {
                    usedTypes.push(p.t);
                    selectedOptions.push(p);
                }
                if (selectedOptions.length === 4) break;
            }

            targetPokemon = selectedOptions[Math.floor(Math.random() * selectedOptions.length)];

            let templates = questionTemplates[targetPokemon.t] || [`Which Pokémon is a ${targetPokemon.t} type?`];
            currentQuestionText = templates[Math.floor(Math.random() * templates.length)];

            renderOptions(selectedOptions);
            
            document.getElementById('message').innerText = "Listen & Choose!";
            document.getElementById('message').className = "text-xl md:text-3xl font-bold text-blue-500 h-8 md:h-10";
            document.getElementById('questionText').innerText = currentQuestionText;
            document.getElementById('audioBtn').classList.remove('hidden');
            
            speakText(currentQuestionText, 0.75);
        }

        function renderOptions(optionsData) {
            const container = document.getElementById('optionsContainer');
            optionsData.sort(() => Math.random() - 0.5).forEach(poke => {
                const card = document.createElement('div');
                card.className = 'poke-card bg-white border-4 border-gray-200 rounded-2xl md:rounded-3xl p-3 md:p-4 w-[45%] md:w-64 h-48 md:h-72 flex flex-col items-center justify-center';
                card.dataset.id = poke.i; 
                
                const imageUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${poke.i}.png`;
                
                card.innerHTML = `<img id="img-${poke.i}" src="${imageUrl}" alt="Pokemon" class="h-24 md:h-48 object-contain pointer-events-none transition-all duration-300">`;
                
                // 新增：把 event 傳遞進去以取得點擊座標
                card.onclick = (e) => checkAnswer(e, card, poke.i);
                container.appendChild(card);
            });
        }

        // 新增：顯示彈出浮動動畫的功能
        function showFloatingAnim(x, y, text, colorClass) {
            const el = document.createElement('div');
            el.innerText = text;
            // 結合 Tailwind 與 自訂 CSS
            el.className = `floating-anim ${colorClass} text-3xl md:text-5xl font-black`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            
            document.body.appendChild(el);
            
            // 動畫結束後自動移除該元素
            setTimeout(() => {
                el.remove();
            }, 1000);
        }

        function checkAnswer(event, selectedCard, selectedId) {
            if (isProcessing) return; 
            isProcessing = true; 
            
            const msgEl = document.getElementById('message');
            const allCards = document.querySelectorAll('.poke-card');

            // 取得點擊座標 (給浮動動畫使用)
            const clickX = event.clientX;
            const clickY = event.clientY;

            if (selectedId === targetPokemon.i) {
                // 答對動畫與計分
                showFloatingAnim(clickX, clickY, '✅ +10', 'text-green-500');

                msgEl.innerText = "Correct! 🌟";
                msgEl.className = "text-xl md:text-3xl font-bold text-green-500 h-8 md:h-10";
                speakText("Correct!", 0.9);
                
                score += 10; // 改為配合動畫的 +10 分
                document.getElementById('scoreText').innerText = score;

                const targetImg = document.getElementById(`img-${targetPokemon.i}`);
                targetImg.classList.add('img-shrink'); 
                targetImg.classList.remove('h-24', 'md:h-48');

                const infoDiv = document.createElement('div');
                infoDiv.className = 'fade-in-up flex flex-col items-center justify-center mt-1 md:mt-2 w-full px-1';
                infoDiv.innerHTML = `
                    <h3 class="text-lg md:text-2xl font-black text-gray-800 tracking-wide">${targetPokemon.e.toUpperCase()}</h3>
                    <p class="text-sm md:text-lg font-bold text-gray-500 mb-1 leading-none">${targetPokemon.z}</p>
                    <div class="bg-green-100 text-green-800 border-2 border-green-300 rounded-lg w-full py-1 text-xs md:text-sm font-bold text-center leading-tight">
                        ${targetPokemon.eg}<br>
                        <span class="text-[10px] md:text-xs text-green-600">${targetPokemon.zg}</span>
                    </div>
                `;
                selectedCard.appendChild(infoDiv);

                allCards.forEach(card => {
                    if (parseInt(card.dataset.id) === targetPokemon.i) {
                        card.classList.add('correct-card');
                    } else {
                        card.classList.add('wrong-card');
                    }
                });

                showNextButton();

            } else {
                // 答錯動畫與計分
                showFloatingAnim(clickX, clickY, '❌ -2', 'text-red-500');

                msgEl.innerText = "Oops! Try again! ❌";
                msgEl.className = "text-xl md:text-3xl font-bold text-red-500 h-8 md:h-10";
                speakText("Oops! Try again.", 0.9);
                
                selectedCard.classList.add('wrong-card', 'shake');
                
                score = Math.max(0, score - 2); // 改為配合動畫的 -2 分 (最低0分)
                document.getElementById('scoreText').innerText = score;
                
                setTimeout(() => {
                    selectedCard.classList.remove('shake');
                    isProcessing = false; 
                }, 500);
            }
        }

        function showNextButton() {
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('hidden');
            
            if (currentRound >= totalRounds) {
                nextBtn.innerText = "Play Again (再玩一次) 🏆";
                nextBtn.className = "mt-8 md:mt-10 bg-green-500 hover:bg-green-600 text-white px-6 py-3 md:px-10 md:py-4 rounded-full font-bold shadow-lg transition text-lg md:text-2xl mx-auto block";
                nextBtn.onclick = initGame;
                document.getElementById('message').innerText = `Game Over! Final Score: ${score} 🎉`;
            }
        }

        function nextRound() {
            currentRound++;
            isProcessing = false; 
            startRound();
        }

        // 確保網頁完全載入後啟動
        window.addEventListener('DOMContentLoaded', () => {
            setMode('simple');
        });
    </script>
</body>
</html>
